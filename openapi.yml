openapi: 3.1.0
info:
  title: Repertoire API
  version: 1.0.0
  description: Music practice tracker API

servers:
  - url: http://localhost:3000
    description: Local development

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  schemas:
    Song:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [Song, Riff, Melody, Progression]
        artist:
          type: string
          nullable: true
        album:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        key:
          type: string
          nullable: true
        bpm:
          type: integer
          nullable: true
        time_signature:
          type: string
          nullable: true
        genre:
          type: string
          nullable: true
        last_practiced:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SongInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [Song, Riff, Melody, Progression]
          default: Song
        artist:
          type: string
        album:
          type: string
        url:
          type: string
        key:
          type: string
        bpm:
          type: string
        time_signature:
          type: string
        genre:
          type: string

    PracticeSession:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        song_id:
          type: integer
        duration:
          type: integer
          description: Duration in seconds
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /api/auth/signup:
    post:
      summary: Create a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: Account created; sets auth cookie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Missing fields, invalid email, or password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      summary: Log in and receive auth cookie
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful; sets auth cookie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      summary: Log out and clear auth cookie
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/songs:
    get:
      summary: List songs for the authenticated user
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Filter by name or artist (case-insensitive)
        - name: type
          in: query
          schema:
            type: string
            enum: [Song, Riff, Melody, Progression]
          description: Filter by song type
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, artist, type, created_at, last_practiced]
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of songs
          content:
            application/json:
              schema:
                type: object
                properties:
                  songs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Song'

    post:
      summary: Create a new song
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SongInput'
      responses:
        '201':
          description: Song created
          content:
            application/json:
              schema:
                type: object
                properties:
                  song:
                    $ref: '#/components/schemas/Song'
        '400':
          description: Name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/songs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get a song by ID
      responses:
        '200':
          description: Song found
          content:
            application/json:
              schema:
                type: object
                properties:
                  song:
                    $ref: '#/components/schemas/Song'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update a song
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SongInput'
      responses:
        '200':
          description: Song updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  song:
                    $ref: '#/components/schemas/Song'
        '400':
          description: Name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete a song
      responses:
        '200':
          description: Song deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/songs/{id}/stats:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get practice stats for a song
      responses:
        '200':
          description: Practice statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_sessions:
                    type: integer
                  minutes_total:
                    type: integer
                  days_in_a_row:
                    type: integer
                    description: Current consecutive-day practice streak
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/practice-sessions:
    get:
      summary: List practice sessions for a song
      parameters:
        - name: songId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of sessions, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PracticeSession'
        '400':
          description: songId is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Song not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Log a practice session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [songId, duration]
              properties:
                songId:
                  type: integer
                duration:
                  type: number
                  description: Duration in seconds (minimum 1)
                  minimum: 1
      responses:
        '201':
          description: Session logged
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: '#/components/schemas/PracticeSession'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Song not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
